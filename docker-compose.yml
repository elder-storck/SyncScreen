services:
  syncscreen:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - PORT=3001
      - PANEL_PORT=3002
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
