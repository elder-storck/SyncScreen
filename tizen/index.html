<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data: blob:; media-src *;">
    <title>SyncScreen</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="slideshow-view" class="view">
        <img id="slide-img" src="img/default.png" alt="">
    </div>
    <div id="webview-view" class="view hidden">
        <iframe id="kiosk-frame" src="about:blank" allowfullscreen></iframe>
    </div>
    <div id="screencast-view" class="view hidden">
        <video id="cast-video" autoplay playsinline
               style="width:100%;height:100%;object-fit:cover;background:#000"></video>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cache.js"></script>
    <script src="js/slideshow.js"></script>
    <script src="js/webview.js"></script>
    <script src="js/screencast.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
