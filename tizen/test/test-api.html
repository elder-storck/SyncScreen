<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test api.js</title></head>
<body>
<!-- Provide minimal Config stub before loading api.js -->
<script>const Config = { serverUrl: '' };</script>
<script src="js/api.js"></script>
<script>
function assert(cond, msg) {
    const p = document.createElement('p');
    p.style.color = cond ? 'green' : 'red';
    p.textContent = (cond ? 'PASS' : 'FAIL') + ': ' + msg;
    document.body.appendChild(p);
}

const originalFetch = window.fetch;

// --- network error → null ---
window.fetch = () => Promise.reject(new Error('no network'));

Api.register('tv1', 'Test TV', '').then(r => assert(r === null, 'register: null on network error'));
Api.heartbeat('tv1').then(r =>         assert(r === null, 'heartbeat: null on network error'));
Api.downloadImage('x.jpg').then(r =>   assert(r === null, 'downloadImage: null on network error'));

// --- successful register/heartbeat response ---
window.fetch = () => Promise.resolve({
    ok: true,
    json: () => Promise.resolve({
        config: {
            mode: 'slideshow',
            webview_url: '',
            slide_interval: 8,
            images: [{ id: 1, filename: 'x.jpg' }]
        }
    })
});

Api.register('tv1', 'Test', '').then(r => {
    assert(r !== null,                       'register: returns config on success');
    assert(r.mode === 'slideshow',           'register: mode parsed');
    assert(r.slideInterval === 8,            'register: slideInterval parsed');
    assert(r.images.length === 1,            'register: images array length');
    assert(r.images[0].filename === 'x.jpg', 'register: image filename');
});

// --- HTTP error status → null ---
window.fetch = () => Promise.resolve({ ok: false, status: 500 });
Api.heartbeat('tv1').then(r => assert(r === null, 'heartbeat: null on HTTP 500'));

window.fetch = originalFetch;
document.body.appendChild(Object.assign(document.createElement('p'), { textContent: 'Done.' }));
</script>
</body></html>
