<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SyncScreen — Login</title>
  <link rel="icon" type="image/jpeg" href="/assets/logo%20MM.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; }
    .login-card { width: 100%; max-width: 380px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4 py-2">
  <span class="navbar-brand fw-bold fs-5"><img src="/assets/logo%20MM.jpg" height="32" style="border-radius:4px;object-fit:contain" class="me-2">SyncScreen</span>
</nav>

<div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
  <div class="login-card card shadow-sm">
    <div class="card-body p-4">
      <h5 class="card-title mb-4 text-center fw-semibold">Entrar no Painel</h5>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label small fw-semibold" for="username">Usuário</label>
          <input
            id="username"
            class="form-control"
            type="text"
            autocomplete="username"
            required
            autofocus
          >
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold" for="password">Senha</label>
          <input
            id="password"
            class="form-control"
            type="password"
            autocomplete="current-password"
            required
          >
        </div>

        <div id="login-msg" class="mb-3"></div>

        <button type="submit" id="btn-submit" class="btn btn-primary w-100">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-submit');
  const msgEl = document.getElementById('login-msg');

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  msgEl.innerHTML = '';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    if (res.ok) {
      location.href = '/';
      return;
    }

    const data = await res.json().catch(() => ({}));
    msgEl.innerHTML = `<div class="alert alert-danger py-2 small">${data.error || 'Erro ao entrar. Tente novamente.'}</div>`;
  } catch {
    msgEl.innerHTML = '<div class="alert alert-danger py-2 small">Sem conexão com o servidor.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Entrar';
}
</script>

</body>
</html>
