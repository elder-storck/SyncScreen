<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SyncScreen — Painel</title>
  <link rel="icon" type="image/jpeg" href="/assets/logo%20MM.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    body { background: #f0f2f5; }
    .tv-card { border-left: 5px solid #6c757d; transition: border-color .3s; }
    .tv-card.online  { border-left-color: #198754; }
    .tv-card.offline { border-left-color: #dc3545; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .dot-on  { background: #198754; }
    .dot-off { background: #dc3545; }
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .img-item { position: relative; cursor: grab; }
    .img-item img { width: 100%; height: 110px; object-fit: cover; border-radius: 6px; border: 2px solid #dee2e6; }
    .img-item .del { position: absolute; top: 4px; right: 4px; padding: 0 6px; line-height: 20px; font-size: 12px; }
    .img-item small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: #6c757d; }
    .badge-url { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
    .group-name-text { font-weight: 600; font-size: .9rem; }
    .group-name-input { border: 1px solid #0d6efd; border-radius: 3px; background: #fff; padding: 0 4px; font-weight: 600; font-size: .9rem; width: 120px; outline: none; }
    .group-edit-btn { cursor: pointer; opacity: .4; font-size: .75rem; margin-left: 5px; transition: opacity .15s; vertical-align: middle; }
    .group-edit-btn:hover { opacity: 1; }
    .group-del-btn  { cursor: pointer; opacity: .35; font-size: .7rem; margin-left: 3px; color: #dc3545; transition: opacity .15s; vertical-align: middle; }
    .group-del-btn:hover  { opacity: 1; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4 py-2">
  <span class="navbar-brand fw-bold fs-5"><img src="/assets/logo%20MM.jpg" height="32" style="border-radius:4px;object-fit:contain" class="me-2">SyncScreen</span>
  <div class="d-flex align-items-center gap-3">
    <span class="text-secondary small" id="refresh-time"></span>
    <span class="text-secondary small" id="nav-user"></span>
    <a id="btn-admin" href="/admin" class="btn btn-sm btn-outline-warning" hidden>⚙ Admin</a>
    <button class="btn btn-sm btn-outline-secondary" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="container py-4" style="max-width:1100px">

  <!-- TVs -->
  <div class="card shadow-sm mb-4">
    <div class="card-header d-flex justify-content-between align-items-center py-2">
      <h6 class="mb-0 fw-semibold">TVs Registradas</h6>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadTVs()">↻ Atualizar</button>
    </div>
    <div class="card-body py-3" id="tv-list">
      <p class="text-muted mb-0 small">Carregando...</p>
    </div>
  </div>

  <!-- Imagens -->
  <div class="card shadow-sm mb-4">
    <div class="card-header py-2">
      <h6 class="mb-0 fw-semibold">Imagens do Slideshow</h6>
    </div>
    <div class="card-body p-0">
      <ul class="nav nav-tabs px-3 pt-2" id="group-tabs" role="tablist"></ul>
      <div class="tab-content p-3" id="group-tab-content"></div>
    </div>
  </div>

  <!-- Screencast -->
  <div class="card shadow-sm mb-4">
    <div class="card-header py-2">
      <h6 class="mb-0 fw-semibold">📡 Transmissão de Tela</h6>
    </div>
    <div class="card-body">
      <div id="cast-tv-list" class="mb-3">
        <p class="text-muted small mb-0">Carregando TVs...</p>
      </div>
      <div class="d-flex gap-2 align-items-center flex-wrap">
        <button id="btn-start-cast" class="btn btn-primary btn-sm" onclick="startCast()">
          Iniciar Transmissão
        </button>
        <button id="btn-stop-cast" class="btn btn-danger btn-sm" onclick="stopCast()" hidden>
          Encerrar Transmissão
        </button>
        <span id="cast-status" class="text-muted small"></span>
      </div>
      <div id="cast-msg" class="mt-2"></div>
    </div>
  </div>
</div>

<!-- Modal: config por TV -->
<div class="modal fade" id="tvModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title">Configurar TV: <strong id="modal-tv-name"></strong></h6>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modal-tv-id">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Modo</label>
          <select class="form-select form-select-sm" id="m-mode" onchange="onModalModeChange()">
            <option value="webview">🌐 Site (WebView)</option>
          </select>
        </div>
        <div class="mb-3" id="m-url-row" style="display:none">
          <label class="form-label small fw-semibold">URL do site</label>
          <input class="form-control form-control-sm" id="m-url" type="url" placeholder="https://...">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Intervalo slides (s)</label>
          <input class="form-control form-control-sm" id="m-interval" type="number" min="1" max="3600">
        </div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-sm btn-primary" onclick="saveTV()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
let tvModal;
let allTVs = [];
let tvAliasMap = {};   // tv_id → display_name
let imageGroups = [];

function displayName(tv) {
  return tvAliasMap[tv.id] || tv.id;
}

document.addEventListener('DOMContentLoaded', async () => {
  const me = await api('/api/auth/me');
  if (!me) return;

  document.getElementById('nav-user').textContent = me.username;
  if (me.role === 'admin') {
    document.getElementById('btn-admin').hidden = false;
  }

  tvModal = new bootstrap.Modal(document.getElementById('tvModal'));
  loadAll();
  connectWS();
  setInterval(loadTVs, 10_000);
});

async function loadAll() {
  await loadAliases();
  loadTVs();
  loadImages();
}

async function loadAliases() {
  const aliases = await api('/api/tv-aliases') ?? [];
  tvAliasMap = Object.fromEntries(aliases.map(a => [a.tv_id, a.display_name]));
}

// WebSocket para receber notificações do servidor em tempo real
function connectWS() {
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${wsProto}//${location.host}/ws`);
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'tv_updated' || msg.type === 'tv_removed') loadTVs();
    if (msg.type === 'images_updated') loadImages();
    if (msg.type === 'config_updated') loadTVs();
    if (msg.type === 'aliases_updated') loadAliases().then(() => loadTVs());
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

// ─── TVs ────────────────────────────────────────────────────────────────────

async function loadTVs() {
  const tvs = await api('/api/tvs') ?? [];
  allTVs = tvs;
  const el = document.getElementById('tv-list');
  document.getElementById('refresh-time').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR');

  if (!tvs.length) {
    el.innerHTML = '<p class="text-muted small mb-0">Nenhuma TV registrada. Inicie o app em uma TV.</p>';
  } else {
    const sorted = [...tvs].sort((a, b) =>
      displayName(a).localeCompare(displayName(b), 'pt-BR'));
    el.innerHTML = sorted.map(tv => `
      <div class="tv-card card mb-2 ${tv.online ? 'online' : 'offline'}">
        <div class="card-body d-flex align-items-center gap-3 py-2 px-3">
          <span><span class="dot ${tv.online ? 'dot-on' : 'dot-off'}"></span>
            <small class="fw-semibold text-${tv.online ? 'success' : 'danger'}">${tv.online ? 'Online' : 'Offline'}</small>
          </span>
          <div class="flex-grow-1 overflow-hidden">
            <div class="fw-semibold text-truncate">${esc(displayName(tv))}</div>
            <small class="text-muted">${esc(tv.ip_address || 'IP desconhecido')} · ${ago(tv.last_seen)} · ${tv.effective_mode === 'webview' ? '🌐 Site' : '🖼 Slideshow'}</small>
          </div>
          <button class="btn btn-sm btn-outline-primary" onclick="openTV('${tv.id}','${esc(tv.name)}')">⚙ Config.</button>
          <button class="btn btn-sm btn-outline-danger"  onclick="deleteTV('${tv.id}')">✕</button>
        </div>
      </div>
    `).join('');
  }
  loadCastTVs();
}

async function deleteTV(id) {
  if (!confirm('Remover esta TV da lista?')) return;
  await api(`/api/tvs/${id}`, { method: 'DELETE' });
  loadTVs();
}

// ─── Config por TV (modal) ──────────────────────────────────────────────────

function onModalModeChange() {
  const val = document.getElementById('m-mode').value;
  document.getElementById('m-url-row').style.display = val === 'webview' ? '' : 'none';
}

async function openTV(id, name) {
  document.getElementById('modal-tv-id').value = id;
  document.getElementById('modal-tv-name').textContent = name;

  // Reconstrói opções de slideshow no select a partir dos grupos atuais
  const groups = await api('/api/image-groups') ?? [];
  const select = document.getElementById('m-mode');
  [...select.options].filter(o => o.value.startsWith('slideshow_')).forEach(o => o.remove());
  groups.forEach(g => select.appendChild(new Option(`🖼 ${g.name}`, `slideshow_${g.id}`)));

  const cfg = await api(`/api/config/${id}`);
  const firstId = groups[0]?.id ?? 1;
  let modeVal = `slideshow_${firstId}`;
  if (cfg) {
    if (cfg.mode === 'webview') {
      modeVal = 'webview';
    } else {
      const gid = cfg.image_group ?? firstId;
      modeVal = groups.some(g => g.id === gid) ? `slideshow_${gid}` : `slideshow_${firstId}`;
    }
    document.getElementById('m-url').value      = cfg.webview_url || '';
    document.getElementById('m-interval').value = cfg.slide_interval || 5;
  } else {
    document.getElementById('m-url').value      = '';
    document.getElementById('m-interval').value = 5;
  }
  select.value = modeVal;
  onModalModeChange();
  tvModal.show();
}

async function saveTV() {
  const id  = document.getElementById('modal-tv-id').value;
  const val = document.getElementById('m-mode').value;

  const mode        = val === 'webview' ? 'webview' : 'slideshow';
  const image_group = val === 'webview' ? 1 : parseInt(val.replace('slideshow_', ''), 10);

  await api(`/api/config/${id}`, {
    method: 'PUT',
    json: {
      mode,
      image_group,
      webview_url:    document.getElementById('m-url').value,
      slide_interval: parseInt(document.getElementById('m-interval').value) || 5,
    },
  });
  tvModal.hide();
  loadTVs();
}

// ─── Imagens ────────────────────────────────────────────────────────────────

async function loadImages() {
  imageGroups = await api('/api/image-groups') ?? [];
  const images  = await api('/api/images') ?? [];

  // Preserve active tab across rebuild
  const activePane = document.querySelector('#group-tab-content .tab-pane.active');
  const activeGroupId = activePane ? parseInt(activePane.id.replace('pane-g', ''), 10) : null;

  const tabsEl    = document.getElementById('group-tabs');
  const contentEl = document.getElementById('group-tab-content');

  tabsEl.innerHTML    = '';
  contentEl.innerHTML = '';

  const canDelete = imageGroups.length > 1;

  imageGroups.forEach((group, i) => {
    const isActive = activeGroupId ? group.id === activeGroupId : i === 0;
    const groupImgs = images.filter(img => img.group_id === group.id);

    // Tab pill
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `
      <button class="nav-link${isActive ? ' active' : ''}" id="tab-g${group.id}"
              data-bs-toggle="tab" data-bs-target="#pane-g${group.id}" type="button">
        <span id="gname-${group.id}" class="group-name-text">${esc(group.name)}</span><span class="group-edit-btn" onclick="event.stopPropagation();startRename(${group.id})" title="Renomear grupo">✏</span>${canDelete ? `<span class="group-del-btn" onclick="event.stopPropagation();removeGroup(${group.id})" title="Remover grupo">✕</span>` : ''}
      </button>`;
    tabsEl.appendChild(li);

    // Pane
    const pane = document.createElement('div');
    pane.className = `tab-pane fade${isActive ? ' show active' : ''}`;
    pane.id = `pane-g${group.id}`;
    pane.innerHTML = `
      <div id="dropzone-${group.id}"
           onclick="document.getElementById('file-input-${group.id}').click()"
           ondragover="onDragOver(event,${group.id})"
           ondragleave="onDragLeave(${group.id})"
           ondrop="onDrop(event,${group.id})"
           style="border:2px dashed #adb5bd;border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s">
        <div class="fs-5 mb-1">⬆️</div>
        <div class="small">Clique ou arraste imagens aqui</div>
        <small class="text-muted">JPG, PNG, GIF, WEBP · máx. 20 MB</small>
        <input type="file" id="file-input-${group.id}" multiple accept="image/*" class="d-none"
               onchange="uploadFiles(this.files,${group.id})">
      </div>
      <div id="upload-msg-${group.id}" class="mt-2"></div>
      <hr class="my-3">
      <div id="img-grid-${group.id}" class="img-grid">
        ${groupImgs.length
          ? groupImgs.map(img => `
            <div class="img-item" data-id="${img.id}">
              <img src="/uploads/${esc(img.filename)}" alt="${esc(img.original_name)}" loading="lazy">
              <button class="btn btn-danger del" onclick="deleteImg(${img.id})">✕</button>
              <small title="${esc(img.original_name)}">${esc(img.original_name)}</small>
            </div>`).join('')
          : '<p class="text-muted small">Nenhuma imagem neste grupo.</p>'
        }
      </div>`;
    contentEl.appendChild(pane);
  });

  // Botão "+" para adicionar grupo
  const addLi = document.createElement('li');
  addLi.className = 'nav-item ms-1';
  addLi.innerHTML = `<button class="nav-link text-primary" type="button" onclick="addGroup()" title="Novo grupo" style="opacity:.65;font-size:1.1rem;padding:4px 10px">＋</button>`;
  tabsEl.appendChild(addLi);
}

async function addGroup() {
  const result = await api('/api/image-groups', { method: 'POST', json: { name: `Grupo ${imageGroups.length + 1}` } });
  if (!result) return;
  await loadImages();
  const newTab = document.getElementById(`tab-g${result.id}`);
  if (newTab) bootstrap.Tab.getOrCreateInstance(newTab).show();
  setTimeout(() => startRename(result.id), 50);
}

async function removeGroup(groupId) {
  const g = imageGroups.find(g => g.id === groupId);
  if (!confirm(`Remover "${g?.name ?? 'este grupo'}"? As imagens serão movidas para outro grupo.`)) return;
  const ok = await api(`/api/image-groups/${groupId}`, { method: 'DELETE' });
  if (ok) await loadImages();
}

function startRename(groupId) {
  const nameEl = document.getElementById(`gname-${groupId}`);
  if (!nameEl || nameEl.tagName === 'INPUT') return;
  const originalName = imageGroups.find(g => g.id === groupId)?.name || nameEl.textContent;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'group-name-input';
  input.value = originalName;
  nameEl.replaceWith(input);
  input.focus();
  input.select();

  let done = false;
  input.addEventListener('blur', () => {
    if (done) return;
    done = true;
    renameGroup(groupId, input, originalName);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') {
      done = true;
      const span = document.createElement('span');
      span.id = `gname-${groupId}`;
      span.className = 'group-name-text';
      span.textContent = originalName;
      input.replaceWith(span);
    }
  });
}

async function renameGroup(groupId, inputEl, originalName) {
  const name = inputEl.value.trim();
  const makeSpan = (text) => {
    const span = document.createElement('span');
    span.id = `gname-${groupId}`;
    span.className = 'group-name-text';
    span.textContent = text;
    return span;
  };
  if (!name) { inputEl.replaceWith(makeSpan(originalName)); return; }
  inputEl.replaceWith(makeSpan(name));
  const ok = await api(`/api/image-groups/${groupId}`, { method: 'PUT', json: { name } });
  if (ok) {
    const g = imageGroups.find(g => g.id === groupId);
    if (g) g.name = name;
  } else {
    const span = document.getElementById(`gname-${groupId}`);
    if (span) span.textContent = originalName;
  }
}

async function deleteImg(id) {
  if (!confirm('Remover esta imagem?')) return;
  await api(`/api/images/${id}`, { method: 'DELETE' });
  loadImages();
}

// ─── Upload ─────────────────────────────────────────────────────────────────

function onDragOver(e, groupId) {
  e.preventDefault();
  document.getElementById(`dropzone-${groupId}`).style.borderColor = '#0d6efd';
  document.getElementById(`dropzone-${groupId}`).style.background  = '#f0f4ff';
}
function onDragLeave(groupId) {
  document.getElementById(`dropzone-${groupId}`).style.borderColor = '#adb5bd';
  document.getElementById(`dropzone-${groupId}`).style.background  = '';
}
function onDrop(e, groupId) {
  e.preventDefault();
  onDragLeave(groupId);
  uploadFiles(e.dataTransfer.files, groupId);
}

async function uploadFiles(files, groupId) {
  if (!files?.length) return;

  // Show "sending" on current (pre-rebuild) element
  const sendingEl = document.getElementById(`upload-msg-${groupId}`);
  if (sendingEl) sendingEl.innerHTML = '<div class="alert alert-info py-1 small">Enviando...</div>';

  let ok = 0, fail = 0;
  for (const file of Array.from(files)) {
    const fd = new FormData();
    fd.append('image', file);
    fd.append('group_id', groupId);
    const res = await fetch('/api/images', { method: 'POST', body: fd });
    if (res.ok) ok++; else fail++;
  }

  const msgType = fail ? 'warning' : 'success';
  const msgText = `${ok} imagem(ns) enviada(s)${fail ? ` · ${fail} com erro` : ''}.`;

  // Rebuild DOM (this wipes the old upload-msg element)
  await loadImages();

  // Now look up the fresh element from the rebuilt DOM
  const msgEl = document.getElementById(`upload-msg-${groupId}`);
  if (msgEl) {
    msgEl.innerHTML = `<div class="alert alert-${msgType} py-1 small">${msgText}</div>`;
    setTimeout(() => { if (msgEl) msgEl.innerHTML = ''; }, 4000);
  }

  const input = document.getElementById(`file-input-${groupId}`);
  if (input) input.value = '';
}

// ─── Screencast ─────────────────────────────────────────────────────────────

let castStream = null;
let castWs     = null;
const peerConns = new Map(); // tvId → RTCPeerConnection

function loadCastTVs() {
  const container = document.getElementById('cast-tv-list');
  if (!allTVs.length) {
    container.innerHTML = '<p class="text-muted small mb-0">Nenhuma TV registrada.</p>';
    return;
  }
  const streaming = document.getElementById('btn-start-cast').hidden;
  // Preserva seleções existentes antes de re-renderizar
  const selected = new Set([...document.querySelectorAll('#cast-tv-list input:checked')].map(el => el.value));
  const sorted = [...allTVs].sort((a, b) =>
    displayName(a).localeCompare(displayName(b), 'pt-BR'));
  container.innerHTML = sorted.map(tv => `
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="cast-${esc(tv.id)}" value="${esc(tv.id)}"
             ${!tv.online || streaming ? 'disabled' : ''}
             ${selected.has(tv.id) && tv.online ? 'checked' : ''}>
      <label class="form-check-label small" for="cast-${esc(tv.id)}">
        <span class="dot ${tv.online ? 'dot-on' : 'dot-off'}"></span>
        ${esc(displayName(tv))}
        <span class="text-muted">(${esc(tv.ip_address || 'IP desconhecido')})</span>
        ${!tv.online ? '<span class="badge bg-secondary ms-1">offline</span>' : ''}
      </label>
    </div>
  `).join('');
}

async function startCast() {
  document.getElementById('btn-start-cast').disabled = true;
  const checked = [...document.querySelectorAll('#cast-tv-list input:checked')];
  if (!checked.length) {
    flashMsg('cast-msg', 'warning', 'Selecione ao menos uma TV online.');
    document.getElementById('btn-start-cast').disabled = false;
    return;
  }
  const tvIds = checked.map(el => el.value);

  try {
    castStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 30, max: 30 } },
      audio: false,
    });
  } catch {
    document.getElementById('btn-start-cast').disabled = false;
    return;
  }

  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  castWs = new WebSocket(`${wsProto}//${location.host}/signal`);
  castWs.onopen = () => {
    castWs.send(JSON.stringify({ type: 'broadcaster-hello', tvIds }));
  };
  castWs.onmessage = ({ data }) => handleSignalMsg(JSON.parse(data));
  castWs.onclose = () => onCastEnd();

  castStream.getVideoTracks()[0].onended = () => stopCast();

  document.getElementById('btn-start-cast').hidden = true;
  document.getElementById('btn-stop-cast').hidden  = false;
  document.getElementById('cast-status').textContent = 'Aguardando TVs...';
  document.querySelectorAll('#cast-tv-list input').forEach(el => el.disabled = true);
}

function handleSignalMsg(msg) {
  if (msg.type === 'tv-ready') {
    createOffer(msg.tvId);
    document.getElementById('cast-status').textContent = `${peerConns.size} TV(s) conectada(s)`;
  } else if (msg.type === 'answer') {
    peerConns.get(msg.tvId)?.setRemoteDescription(msg.sdp).catch(() => {});
  } else if (msg.type === 'ice') {
    peerConns.get(msg.tvId)?.addIceCandidate(msg.candidate).catch(() => {});
  }
}

async function createOffer(tvId) {
  if (!castStream) return;
  const pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
    bundlePolicy: 'max-bundle',
    rtcpMuxPolicy: 'require',
  });
  peerConns.set(tvId, pc);

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
      pc.close();
      peerConns.delete(tvId);
      const count = peerConns.size;
      document.getElementById('cast-status').textContent =
        count ? `${count} TV(s) conectada(s)` : 'Aguardando TVs...';
    }
  };

  // addTransceiver para controlar direção e preferência de codec
  const videoTrack = castStream.getVideoTracks()[0];

  // contentHint='detail': informa ao encoder que o conteúdo tem alta nitidez
  // (slides, texto, PDFs). O Chrome passa a emitir keyframes com mais frequência
  // e mantém qualidade de imagem em vez de sacrificá-la para reduzir bitrate.
  // Endereça o freeze em troca de slide: sem hint, VP9 screen content coding
  // envia quase zero bytes em slide estático → GCC reduz estimativa de banda →
  // troca de slide strava até o GCC se recuperar.
  videoTrack.contentHint = 'detail';

  const transceiver = pc.addTransceiver(videoTrack, { direction: 'sendonly', streams: [castStream] });

  pc.onicecandidate = ({ candidate }) => {
    if (candidate && castWs?.readyState === WebSocket.OPEN) {
      castWs.send(JSON.stringify({ type: 'ice', tvId, candidate }));
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Piso de bitrate para evitar que o GCC estime banda ~0 durante slide estático.
  // degradationPreference='maintain-resolution': encoder reduz framerate antes de
  // resolução, mantendo nitidez do texto na TV.
  const params = transceiver.sender.getParameters();
  if (params.encodings?.length) {
    params.encodings[0].priority            = 'high';
    params.encodings[0].networkPriority     = 'high';
    params.encodings[0].minBitrate          = 500_000;   // 500 kbps — piso GCC
    params.encodings[0].maxBitrate          = 8_000_000; // 8 Mbps — headroom para troca de slide
    params.encodings[0].degradationPreference = 'maintain-resolution';
    try { await transceiver.sender.setParameters(params); } catch (_) {}
  }

  if (castWs?.readyState === WebSocket.OPEN) {
    castWs.send(JSON.stringify({ type: 'offer', tvId, sdp: pc.localDescription }));
  }
}

function stopCast() {
  if (!castStream && !castWs) return;
  if (castStream) {
    castStream.getTracks().forEach(t => { t.onended = null; t.stop(); });
  }
  if (castWs) castWs.close();
}

function onCastEnd() {
  if (!castWs && !castStream) return;
  if (castWs) castWs.onmessage = null;
  castStream = null;
  castWs    = null;
  peerConns.forEach(pc => pc.close());
  peerConns.clear();
  document.getElementById('btn-start-cast').hidden = false;
  document.getElementById('btn-stop-cast').hidden  = true;
  document.getElementById('cast-status').textContent = '';
  loadCastTVs();
}

// ─── Helpers ────────────────────────────────────────────────────────────────

async function api(url, opts = {}) {
  try {
    const options = { method: opts.method || 'GET', headers: {} };
    if (opts.json) {
      options.headers['Content-Type'] = 'application/json';
      options.body = JSON.stringify(opts.json);
    }
    const res = await fetch(url, options);
    if (res.status === 401) { location.href = '/login'; return null; }
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  location.href = '/login';
}

function flashMsg(elId, type, msg) {
  const el = document.getElementById(elId);
  el.innerHTML = `<div class="alert alert-${type} py-1 small">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
  );
}

function ago(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 5)    return 'agora';
  if (s < 60)   return `${s}s atrás`;
  if (s < 3600) return `${Math.floor(s/60)}min atrás`;
  return new Date(ms).toLocaleString('pt-BR');
}
